      "The Anthropic-Blackstone-H&F-Goldman $1.5B JV and OpenAI's $4B Development Company are the clearest signal yet that frontier labs are de-risking enterprise distribution before going public. PE megafunds are now AI distribution channels with equity in the outcome. Expect a steady drumbeat of similar JVs through year-end.",
      "Sierra at $15.8B on $150M ARR (105x multiple) crystallizes the vertical-agent valuation problem: private multiples remain 5-10x what public SaaS pays. Either private compresses next round or public AI software re-rates higher. The Sierra customer-renewal cohort over the next two quarters is the cleanest read.",
      "Chinese open-weights at sub-1% of Western frontier pricing (DeepSeek-V4-Flash, Gemma 4 family pressure) make model superiority a short-duration moat. For AI software theses, value distribution, proprietary data, and workflow integration over claimed model capability.",
      "Salesforce Agentforce Operations and Microsoft Agent 365 both shipped this week as deterministic, governed agent platforms rather than autonomous-agent products. Enterprise buyers are voting with budget for guardrails over autonomy. Useful contrarian read against venture-funded autonomous-agent trend.",
      "Pentagon's Anthropic exclusion plus Colorado SB 189 confirm US AI policy is splitting: federal defense channel rewards capability-first vendors, state level deregulating actively. For sector rotation, supportive for AI software adopter names, headwind for safety-positioned vendors competing on guardrail-led positioning."
    ]
  }
];
// === BRIEFINGS_DATA_END ===

let activeIndex = 0;

function escape(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[<>&"']/g, function(c) {
    return { '<':'&lt;', '>':'&gt;', '&':'&amp;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function formatChipDate(b) {
  if (b.display_date) {
    return b.display_date.replace(/, \d{4}$/, '');
  }
  return b.date;
}

function slugify(s) {
  return String(s).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function renderChips() {
  const html = briefings.map(function(b, i) {
    const isLatest = i === 0;
    const isActive = i === activeIndex;
    return '<button class="chip' + (isActive ? ' active' : '') + '" data-idx="' + i + '">' +
      '<span class="chip-date">' + escape(formatChipDate(b)) + '</span>' +
      (isLatest ? '<span class="chip-tag">Latest</span>' : '') +
      '</button>';
  }).join('');
  const chips = document.getElementById('chips');
  chips.innerHTML = html;
  chips.querySelectorAll('.chip').forEach(function(el) {
    el.addEventListener('click', function() {
      activeIndex = parseInt(el.getAttribute('data-idx'), 10);
      try { localStorage.setItem('briefing_active_date', briefings[activeIndex].date); } catch (e) {}
      renderAll();
    });
  });
}

function renderHeader() {
  const b = briefings[activeIndex];
  const badge = document.getElementById('badge');
  badge.textContent = activeIndex === 0 ? 'Latest' : 'Archive';
  badge.className = 'badge' + (activeIndex === 0 ? '' : ' archive');
  document.getElementById('meta-text').innerHTML =
    escape(b.display_date || b.date) + ' <span class="dot"></span> ' +
    (b.item_count || countItems(b)) + ' items' +
    (b.prepared_for ? ' <span class="dot"></span> Prepared for ' + escape(b.prepared_for) : '');
  document.getElementById('issue-title').textContent =
    (b.display_date || b.date) + ' Edition';
  const totalSections = (b.sections || []).length + (b.spotlight ? 1 : 0) + (b.takeaways && b.takeaways.length ? 1 : 0);
  document.getElementById('issue-sub').textContent =
    totalSections + ' sections covering models, tools, agents, deal flow, and the day’s industry spotlight.';
}

function countItems(b) {
  return b.sections.reduce(function(n, s) { return n + s.items.length; }, 0);
}

function renderToc() {
  const b = briefings[activeIndex];
  const toc = document.getElementById('toc');
  if (!b || !b.sections) { toc.innerHTML = ''; return; }
  let parts = [];
  b.sections.forEach(function(s, i) {
    parts.push(
      '<a class="toc-link" href="#sec-' + slugify(s.title) + '">' +
      '<span class="toc-num">' + pad2(i + 1) + '</span>' +
      '<span class="toc-text">' + escape(s.title) + '</span>' +
      '</a>'
    );
  });
  if (b.spotlight && b.spotlight.industry) {
    parts.push(
      '<a class="toc-link" href="#spotlight">' +
      '<span class="toc-num">SP</span>' +
      '<span class="toc-text">Spotlight · ' + escape(b.spotlight.industry) + '</span>' +
      '</a>'
    );
  }
  if (b.takeaways && b.takeaways.length) {
    parts.push(
      '<a class="toc-link" href="#takeaways">' +
      '<span class="toc-num">TK</span>' +
      '<span class="toc-text">Takeaways</span>' +
      '</a>'
    );
  }
  toc.innerHTML = parts.join('');
}

function renderBriefing() {
  const b = briefings[activeIndex];
  if (!b) {
    document.getElementById('briefing').innerHTML = '<div class="empty">No briefing selected.</div>';
    return;
  }
  let html = '';
  (b.sections || []).forEach(function(section, sIdx) {
    html += '<section class="section" id="sec-' + slugify(section.title) + '">';
    html += '<div class="section-head">';
    html += '<div class="section-num">' + pad2(sIdx + 1) + '</div>';
    html += '<h2 class="section-title">' + escape(section.title) + '</h2>';
    html += '<div class="section-count">' + section.items.length + ' items</div>';
    html += '</div>';
    section.items.forEach(function(item) {
      html += '<article class="item">';
      html += '<h3 class="item-headline">' + escape(item.headline) + '</h3>';
      html += '<div class="item-summary">' + escape(item.summary) + '</div>';
      if (item.angle) {
        html += '<div class="angle"><span class="angle-label">Investment angle</span>' + escape(item.angle) + '</div>';
      }
      if (item.sources && item.sources.length) {
        html += '<div class="sources"><span class="sources-label">Sources</span>';
        html += item.sources.map(function(s) {
          return '<a href="' + escape(s.url) + '" target="_blank" rel="noopener">' + escape(s.title) + '</a>';
        }).join('');
        html += '</div>';
      }
      html += '</article>';
    });
    html += '</section>';
  });
  if (b.spotlight && b.spotlight.industry) {
    html += '<section class="spotlight-wrap" id="spotlight">';
    html += '<div class="spotlight-eyebrow">Industry Spotlight</div>';
    html += '<h2 class="spotlight-industry">' + escape(b.spotlight.industry) + '</h2>';
    html += '<div class="spotlight-meta">Rotating sector deep-read · ' + escape(b.display_date || b.date) + '</div>';
    html += '<div class="spotlight-body">';
    const paras = Array.isArray(b.spotlight.body) ? b.spotlight.body : [b.spotlight.body];
    paras.forEach(function(p) { html += '<p>' + escape(p) + '</p>'; });
    html += '</div></section>';
  }
  if (b.takeaways && b.takeaways.length) {
    html += '<section class="takeaways-wrap" id="takeaways">';
    html += '<div class="section-head">';
    html += '<div class="section-num">' + pad2((b.sections || []).length + 1) + '</div>';
    html += '<h2 class="section-title">Investment-Relevant Takeaways</h2>';
    html += '<div class="section-count">' + b.takeaways.length + ' points</div>';
    html += '</div>';
    b.takeaways.forEach(function(t, i) {
      html += '<div class="takeaway">';
      html += '<div class="takeaway-num">' + pad2(i + 1) + '</div>';
      html += '<div class="takeaway-text">' + escape(t) + '</div>';
      html += '</div>';
    });
    html += '</section>';
  }
  document.getElementById('briefing').innerHTML = html;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderAll() {
  renderChips();
  renderHeader();
  renderToc();
  renderBriefing();
}

// Restore last viewed date on load (defaults to latest)
try {
  const saved = localStorage.getItem('briefing_active_date');
  if (saved) {
    const idx = briefings.findIndex(function(b) { return b.date === saved; });
    if (idx >= 0) activeIndex = idx;
  }
} catch (e) {}

renderAll();
</script>

</html>
